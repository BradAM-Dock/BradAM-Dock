<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">

<style>
    .bg{fill:#0d1117;}
    .title{fill:#58a6ff;font:18px monospace;}
    .text{fill:#c9d1d9;font:16px monospace;white-space:pre;}
    .cursor{
        fill:#58a6ff;
        animation:blink .8s infinite;
    }

    @keyframes blink{
        50%{opacity:0;}
    }

    .terminal{
        animation:fade 1s ease;
    }

    @keyframes fade{
        from{opacity:0;}
        to{opacity:1;}
    }

    .portrait{
        opacity:0;
        animation:show 2s forwards;
        animation-delay:3s;
    }

    @keyframes show{
        from{opacity:0;}
        to{opacity:1;}
    }

    .loading{
        stroke:#58a6ff;
        stroke-width:8;
        stroke-dasharray:500;
        stroke-dashoffset:500;
        animation:load 3s linear forwards;
    }

    @keyframes load{
        to{
            stroke-dashoffset:0;
        }
    }

</style>

<rect width="900" height="520" class="bg"/>

<text x="30" y="40" class="title">
BradAM-Dock@github:~$
</text>

<line x1="30" y1="70" x2="530" y2="70" class="loading"/>

<text x="30" y="100" class="text">
Loading profile...
</text>

